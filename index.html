<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DPC Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="brand">
        <span class="logo">D</span>
        <div class="brand-text">
          <div class="brand-name">DPC Hub</div>
          <div class="brand-sub">工具中心</div>
        </div>
      </div>

      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7" />
          <path d="m20 20-3.5-3.5" />
        </svg>
        <input id="search" type="text" placeholder="搜尋工具、製作人、tag…" />
      </div>

      <div class="topbar-actions">
        <button class="btn btn-secondary" id="open-add-cat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h18M3 12h18M3 17h12"/></svg>
          新增分類
        </button>
        <button class="btn btn-primary" id="open-add">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          新增工具
        </button>
      </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-block">
        <h3 class="sidebar-title">分類</h3>
        <div class="filter-bar" id="filters"></div>
      </div>

      <div class="sidebar-block sidebar-stats">
        <h3 class="sidebar-title">概覽</h3>
        <div class="stat-row">
          <span class="stat-label">工具總數</span>
          <span class="stat-num" id="stat-total">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">製作人</span>
          <span class="stat-num" id="stat-creators">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">分類</span>
          <span class="stat-num" id="stat-categories">0</span>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="page-head">
        <div>
          <h1 class="page-title" id="head-context">所有工具</h1>
          <p class="page-sub muted">點工具卡片開啟,hover 卡片右上角編輯</p>
        </div>
        <div class="page-actions">
          <button class="link-btn" id="expand-all">全部展開</button>
          <span class="sep">·</span>
          <button class="link-btn" id="collapse-all">全部摺疊</button>
        </div>
      </div>

      <div class="sections-area" id="sections-area"></div>

      <div class="empty" id="empty" hidden>
        <div class="empty-art">
          <svg viewBox="0 0 64 64" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="8" y="14" width="22" height="22" rx="3"/>
            <rect x="34" y="14" width="22" height="22" rx="3"/>
            <rect x="8" y="40" width="22" height="14" rx="3"/>
            <rect x="34" y="40" width="22" height="14" rx="3" stroke-dasharray="3 3"/>
          </svg>
        </div>
        <h2 class="empty-title">還沒有任何工具</h2>
        <p class="empty-sub muted">點右上角「新增工具」開始建立你的第一個入口</p>
        <button class="btn btn-primary" id="empty-cta">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          新增第一個工具
        </button>
      </div>
    </main>
  </div>

  <!-- Add / Edit tool popover -->
  <div class="popover" id="popover" hidden>
    <div class="popover-backdrop" data-close></div>
    <div class="popover-panel" role="dialog" aria-modal="true" aria-labelledby="popover-title">
      <div class="popover-arrow"></div>
      <div class="popover-head">
        <div>
          <div class="popover-title" id="popover-title">新增工具</div>
          <div class="muted small" id="popover-sub">貼上連結自動讀取,或手動填寫</div>
        </div>
        <button class="icon-btn" data-close aria-label="關閉">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>

      <form id="add-form" class="popover-form" onsubmit="return false;">
        <input type="hidden" name="id" />

        <div class="auto-fill">
          <div class="auto-fill-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 4V2M15 14v-2M8 9l-2-2M21 14l-2-2M5 9H3M22 8h-2M17 15.5l3.5 3.5M12 12l9 9M12 22a10 10 0 1 1 10-10"/></svg>
            自動讀取
          </div>
          <div class="auto-fill-row">
            <input id="auto-url" type="url" placeholder="貼上 GitHub repo / 任何網址…" />
            <button type="button" class="btn btn-secondary" id="auto-fetch">讀取</button>
          </div>
          <div class="auto-fill-hint muted small" id="auto-hint">支援 GitHub repo(讀取名稱、描述、作者、語言、tags)與一般 URL(讀取網域)</div>
        </div>

        <div class="form-divider"><span>或自己填</span></div>

        <div class="row">
          <label>
            <span>工具名稱 *</span>
            <input name="name" placeholder="例如:布料查詢 PAGE" required />
          </label>
          <label>
            <span>製作人 *</span>
            <input name="creator" placeholder="例如:Elly" required />
          </label>
        </div>
        <div class="row">
          <label>
            <span>分類</span>
            <input name="category" placeholder="例如:生活 / CLO" list="cat-list" />
            <datalist id="cat-list"></datalist>
          </label>
          <label>
            <span>版本</span>
            <input name="version" placeholder="1.0.0" value="1.0.0" />
          </label>
        </div>
        <div class="row">
          <label>
            <span>連結類型</span>
            <select name="type">
              <option value="url">外部網址 (URL)</option>
              <option value="python">Python script / repo</option>
              <option value="iframe">可內嵌 (iframe)</option>
            </select>
          </label>
          <label>
            <span>URL *</span>
            <input name="url" placeholder="https://..." required />
          </label>
        </div>
        <label>
          <span>描述</span>
          <textarea name="description" rows="2" placeholder="一句話介紹這個工具"></textarea>
        </label>
        <label>
          <span>Tags(逗號分隔)</span>
          <input name="tags" placeholder="例如:布料, 查詢, 自動化" />
        </label>
        <div class="form-actions">
          <button type="button" class="btn btn-danger" id="delete-tool" hidden>刪除</button>
          <div class="form-actions-right">
            <button type="button" class="btn btn-secondary" data-close>取消</button>
            <button type="button" class="btn btn-primary" id="save-tool">儲存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Category popover -->
  <div class="popover" id="cat-popover" hidden>
    <div class="popover-backdrop" data-close></div>
    <div class="popover-panel popover-panel-sm" role="dialog" aria-modal="true">
      <div class="popover-arrow"></div>
      <div class="popover-head">
        <div>
          <div class="popover-title" id="cat-popover-title">新增分類</div>
          <div class="muted small">幫工具分組,例如「生活」「CLO」</div>
        </div>
        <button class="icon-btn" data-close aria-label="關閉">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <form id="cat-form" class="popover-form" onsubmit="return false;">
        <input type="hidden" name="originalName" />
        <label>
          <span>分類名稱 *</span>
          <input name="name" placeholder="例如:生活、CLO、查詢" required />
        </label>
        <label>
          <span>顏色</span>
          <div class="color-picker" id="color-picker"></div>
        </label>
        <div class="form-actions">
          <button type="button" class="btn btn-danger" id="delete-cat" hidden>刪除</button>
          <div class="form-actions-right">
            <button type="button" class="btn btn-secondary" data-close>取消</button>
            <button type="button" class="btn btn-primary" id="save-cat">儲存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Iframe modal -->
  <div class="modal" id="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-panel">
      <div class="modal-head">
        <div>
          <div class="modal-title" id="modal-title">工具</div>
          <div class="modal-sub muted small" id="modal-sub"></div>
        </div>
        <button class="icon-btn" data-close aria-label="關閉">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <iframe id="modal-frame" src="about:blank" loading="lazy"></iframe>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <script src="script.js"></script>
</body>
</html>
