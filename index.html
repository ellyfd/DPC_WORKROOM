<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DPC Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260526c" />
</head>
<body>
  <div class="bg-soft"></div>

  <div class="page">
    <!-- Header -->
    <header class="hero">
      <div class="brand">
        <span class="logo">D</span>
        <div class="brand-text">
          <div class="brand-name">DPC Hub</div>
          <div class="brand-sub">所有 DPC 工具,一站直達</div>
        </div>
      </div>

      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7" />
          <path d="m20 20-3.5-3.5" />
        </svg>
        <input id="search" type="text" placeholder="搜尋工具…" />
      </div>

      <button class="btn btn-primary" id="open-add" aria-label="新增工具">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M5 12h14"/></svg>
        <span class="btn-text">新增工具</span>
      </button>
    </header>

    <!-- Tool board -->
    <main class="board" id="sections-area"></main>

    <!-- Page footer -->
    <div class="page-foot">
      <button class="ghost-pill" id="open-add-cat">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
        新增分類
      </button>
    </div>

    <!-- Empty state -->
    <div class="empty" id="empty" hidden>
      <div class="empty-art">
        <svg viewBox="0 0 64 64" width="76" height="76" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="8" y="14" width="22" height="22" rx="5"/>
          <rect x="34" y="14" width="22" height="22" rx="5"/>
          <rect x="8" y="40" width="22" height="16" rx="5"/>
          <rect x="34" y="40" width="22" height="16" rx="5" stroke-dasharray="3 3"/>
        </svg>
      </div>
      <h2 class="empty-title">還沒有任何工具</h2>
      <p class="empty-sub">把第一個工具加進來,開始用 DPC Hub</p>
      <button class="btn btn-primary btn-lg" id="empty-cta">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        新增第一個工具
      </button>
    </div>
  </div>

  <!-- Hidden IDs the JS still references (no UI) -->
  <div hidden>
    <span id="stat-total">0</span>
    <span id="stat-creators">0</span>
    <span id="stat-categories">0</span>
    <span id="head-context"></span>
    <button id="expand-all"></button>
    <button id="collapse-all"></button>
    <nav id="filters"></nav>
  </div>

  <!-- Add / Edit tool popover -->
  <div class="popover" id="popover" hidden>
    <div class="popover-backdrop" data-close></div>
    <div class="popover-panel" role="dialog" aria-modal="true" aria-labelledby="popover-title">
      <div class="popover-arrow"></div>
      <div class="popover-head">
        <div>
          <div class="popover-title" id="popover-title">新增工具</div>
          <div class="muted small" id="popover-sub">貼上連結自動讀取,或手動填寫</div>
        </div>
        <button class="icon-btn" data-close aria-label="關閉">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>

      <form id="add-form" class="popover-form" onsubmit="return false;">
        <input type="hidden" name="id" />
        <input type="hidden" name="type" value="link" />

        <!-- 1. Type — link, page (HTML) or file. Hidden in edit mode. -->
        <div class="type-selector" id="type-selector">
          <button type="button" class="type-opt" data-type="link" aria-pressed="true" title="URL / GitHub">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
            <span class="type-opt-name">連結</span>
          </button>
          <button type="button" class="type-opt" data-type="page" title="HTML 上傳即發佈">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="6.5"/><path d="M5.5 12h13"/><path d="M12 5.5c1.7 3.2 1.7 9.8 0 13M12 5.5c-1.7 3.2-1.7 9.8 0 13"/></svg>
            <span class="type-opt-name">頁面</span>
          </button>
          <button type="button" class="type-opt" data-type="file" title=".py / .xlsx / 任何檔案">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span class="type-opt-name">檔案</span>
          </button>
        </div>

        <!-- Hidden source of truth — the icon picker below updates this. -->
        <input type="hidden" name="icon" />

        <!-- Icon picker: preview + 上傳 / 網址 / 預設 -->
        <div class="icon-picker" id="icon-picker">
          <div class="icon-preview" id="icon-preview">
            <span class="icon-preview-letter" id="icon-preview-letter"></span>
          </div>
          <div class="icon-actions">
            <button type="button" class="btn-mini" data-icon-action="upload">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
              上傳
            </button>
            <button type="button" class="btn-mini" data-icon-action="url">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
              網址
            </button>
            <button type="button" class="btn-mini btn-mini-ghost" data-icon-action="clear">預設</button>
          </div>
          <input type="file" id="icon-picker-file" accept="image/*" hidden />
        </div>

        <!-- 4a. File manager (file / page type) -->
        <div class="file-manager" data-show-for-type="file,page" hidden>
          <div class="file-manager-title" id="file-manager-title">版本紀錄</div>
          <div class="file-dropzone" id="file-dropzone" tabindex="0" role="button" aria-label="點這裡或拖檔案進來上傳新版本">
            <div class="file-list" id="file-list"></div>
            <div class="file-dropzone-cta">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
              <span id="file-dropzone-cta-text">點這裡或拖檔案進來</span>
            </div>
          </div>
          <div class="file-manager-hint muted small" id="file-manager-hint">每次上傳自動記錄時間 / 上傳人,最新一筆是目前版本。最多保留 5 個版本,單檔上限 25 MB。</div>
          <input type="file" id="file-input" hidden />
        </div>

        <!-- 4b. URL field with built-in 自動讀取 (link type) -->
        <label data-show-for-type="link">
          <span>連結網址 *</span>
          <div class="url-row">
            <input name="url" id="url-input" type="url" placeholder="https://… 或 GitHub repo 網址" />
            <button type="button" class="btn-mini btn-mini-primary" id="auto-fetch" title="從這個網址讀取名稱、描述、作者、頭像">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 4V2M15 14v-2M8 9l-2-2M21 14l-2-2M5 9H3M22 8h-2M17 15.5l3.5 3.5M12 12l9 9M12 22a10 10 0 1 1 10-10"/></svg>
              自動讀取
            </button>
          </div>
          <div class="url-hint muted small" id="auto-hint" hidden></div>
        </label>

        <!-- 6. Common fields -->
        <div class="row">
          <label>
            <span>工具名稱 *</span>
            <input name="name" placeholder="例如:布料查詢 PAGE" required />
          </label>
          <label>
            <span>製作人 *</span>
            <div class="select-row" data-custom-select="creator">
              <select name="creator" id="creator-select" required hidden>
                <option value="" disabled selected>— 選擇製作人 —</option>
                <option value="__new__">＋ 新增製作人…</option>
              </select>
            </div>
          </label>
        </div>
        <div class="row">
          <label>
            <span>分類</span>
            <div class="select-row">
              <select name="category" id="category-select">
                <option value="">— 沒有分類 —</option>
                <option value="__new__">＋ 新增分類…</option>
              </select>
            </div>
          </label>
          <label data-show-for-type="file" hidden>
            <span>品牌 / 客制</span>
            <div class="select-row" data-custom-select="brand">
              <select name="brand" id="brand-select" hidden>
                <option value="">— 沒有指定 —</option>
                <option value="__new__">＋ 新增品牌…</option>
              </select>
            </div>
          </label>
        </div>

        <label>
          <span>描述</span>
          <textarea name="description" rows="2" placeholder="一句話介紹這個工具"></textarea>
        </label>
        <label class="checkbox-row">
          <input type="checkbox" name="lock" id="tool-lock" />
          <span>
            <strong>鎖定</strong>
            <span class="muted small" id="tool-lock-hint">只有你能編輯 / 刪除這個工具(以「製作人」為依據)</span>
          </span>
        </label>
        <div class="form-actions">
          <button type="button" class="btn btn-danger" id="delete-tool" hidden>刪除</button>
          <div class="form-actions-right">
            <button type="button" class="btn btn-secondary" data-close>取消</button>
            <button type="button" class="btn btn-primary" id="save-tool">儲存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Category popover -->
  <div class="popover" id="cat-popover" hidden>
    <div class="popover-backdrop" data-close></div>
    <div class="popover-panel popover-panel-sm" role="dialog" aria-modal="true">
      <div class="popover-arrow"></div>
      <div class="popover-head">
        <div>
          <div class="popover-title" id="cat-popover-title">新增分類</div>
          <div class="muted small">幫工具分組,例如「生活」「CLO」</div>
        </div>
        <button class="icon-btn" data-close aria-label="關閉">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <form id="cat-form" class="popover-form" onsubmit="return false;">
        <input type="hidden" name="originalName" />
        <label>
          <span>分類名稱 *</span>
          <input name="name" placeholder="例如:生活、CLO、查詢" required />
        </label>
        <label>
          <span>顏色</span>
          <div class="color-picker" id="color-picker"></div>
        </label>
        <div class="form-actions">
          <button type="button" class="btn btn-danger" id="delete-cat" hidden>刪除</button>
          <div class="form-actions-right">
            <button type="button" class="btn btn-secondary" data-close>取消</button>
            <button type="button" class="btn btn-primary" id="save-cat">儲存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Mini popover (for adding new creator / category / setting icon URL) -->
  <div class="mini-popover" id="mini-popover" hidden>
    <div class="mini-popover-backdrop" data-close></div>
    <div class="mini-popover-panel" role="dialog" aria-modal="true">
      <div class="mini-popover-head">
        <div class="mini-popover-title" id="mini-popover-title">新增</div>
        <button class="icon-btn" data-close aria-label="關閉">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div class="mini-popover-body">
        <input id="mini-popover-input" type="text" />
        <select id="mini-popover-select" hidden></select>
        <div class="mini-popover-hint muted small" id="mini-popover-hint" hidden></div>
      </div>
      <div class="mini-popover-actions">
        <button type="button" class="btn btn-secondary" data-close>取消</button>
        <button type="button" class="btn btn-primary" id="mini-popover-confirm">確定</button>
      </div>
    </div>
  </div>

  <!-- Floating menu (file tile click → primary action by tool type) -->
  <div class="floating-menu" id="tile-file-menu" hidden>
    <button type="button" class="floating-menu-item primary" data-action="page" id="tile-file-menu-page" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3h7v7"/><path d="M21 3l-9 9"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg>
      <span>開啟頁面</span>
    </button>
    <button type="button" class="floating-menu-item" data-action="download" id="tile-file-menu-download-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      <span id="tile-file-menu-download">下載最新版</span>
    </button>
    <button type="button" class="floating-menu-item" data-action="upload">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      <span>上傳新版本</span>
    </button>
    <div class="floating-menu-sep"></div>
    <button type="button" class="floating-menu-item" data-action="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l3 2"/></svg>
      <span>查看版本歷史</span>
    </button>
    <input type="file" id="tile-file-upload" hidden />
  </div>

  <!-- Unified file panel (latest version + actions + history + upload) -->
  <div class="popover" id="file-popover" hidden>
    <div class="popover-backdrop" data-close></div>
    <div class="popover-panel popover-panel-sm" role="dialog" aria-modal="true">
      <div class="popover-head">
        <div>
          <div class="popover-title" id="file-popover-title">檔案</div>
          <div class="muted small" id="file-popover-sub"></div>
        </div>
        <button class="icon-btn" data-close aria-label="關閉">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div class="file-panel-body">
        <div id="file-panel-latest"></div>
        <div id="file-panel-history-wrap" hidden>
          <div class="file-panel-section-title">歷史版本</div>
          <div id="file-panel-history"></div>
        </div>
        <button type="button" class="btn btn-secondary file-panel-upload" id="file-panel-upload-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          <span>上傳新版本</span>
        </button>
        <input type="file" id="file-panel-upload" hidden />
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <script src="script.js?v=20260526c"></script>
</body>
</html>
